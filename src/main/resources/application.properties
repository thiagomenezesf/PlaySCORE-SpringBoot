# Nome da aplicação
spring.application.name=PlaySCORE-API

# Configurações do Banco de Dados MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/playscore_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
# spring.datasource.username=${DB_USER:root}
# spring.datasource.password=${DB_PASSWORD:}

# Configurações do Hibernate / JPA
# O 'update' cria as tabelas automaticamente baseado nas classes @Entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

